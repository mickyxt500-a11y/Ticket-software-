<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PC Services — Repair Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0F0F0F; color: #E8E3DC; font-family: 'DM Mono', 'Courier New', monospace; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #1A1A1A; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .job-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .job-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .btn-hover { transition: all 0.15s ease; }
  .btn-hover:hover { opacity: 0.85; transform: scale(0.98); }
  .status-pill { transition: all 0.2s ease; cursor: pointer; }
  .status-pill:hover { transform: scale(1.05); }
  input, textarea, select { outline: none; }
  input:focus, textarea:focus, select:focus { border-color: #E8C468 !important; }
  .modal-overlay { animation: fadeIn 0.2s ease; }
  .modal-box { animation: slideUp 0.25s ease; }
  .detail-panel { animation: slideInRight 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .grid-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect } = React;

const STATUS_CONFIG = {
  intake: { label: "Intake", color: "#F59E0B", bg: "#FEF3C7", dot: "#D97706" },
  diagnosing: { label: "Diagnosing", color: "#3B82F6", bg: "#DBEAFE", dot: "#2563EB" },
  waiting_parts: { label: "Waiting Parts", color: "#8B5CF6", bg: "#EDE9FE", dot: "#7C3AED" },
  in_repair: { label: "In Repair", color: "#EF4444", bg: "#FEE2E2", dot: "#DC2626" },
  testing: { label: "Testing", color: "#06B6D4", bg: "#CFFAFE", dot: "#0891B2" },
  ready: { label: "Ready", color: "#10B981", bg: "#D1FAE5", dot: "#059669" },
  collected: { label: "Collected", color: "#6B7280", bg: "#F3F4F6", dot: "#4B5563" },
};

const DEVICE_TYPES = ["Smartphone", "Laptop", "Tablet", "Desktop PC", "Game Console", "Smart Watch", "Other"];

const SAMPLE_JOBS = [
  { id: "RJ-001", customerName: "Marcus Holt", phone: "07700 900123", deviceType: "Smartphone", deviceModel: "iPhone 14 Pro", issue: "Cracked screen, touch unresponsive in lower half", status: "in_repair", techNotes: "LCD + digitizer replacement needed. Ordered parts.", cost: "€149", createdAt: "2024-01-15T09:30:00", priority: "high" },
  { id: "RJ-002", customerName: "Priya Sharma", phone: "07700 900456", deviceType: "Laptop", deviceModel: "Dell XPS 15", issue: "Won't power on, battery may be dead", status: "diagnosing", techNotes: "Running diagnostics. Charger port looks damaged.", cost: "TBD", createdAt: "2024-01-15T11:00:00", priority: "normal" },
  { id: "RJ-003", customerName: "James O'Brien", phone: "07700 900789", deviceType: "Tablet", deviceModel: "iPad Air 5th Gen", issue: "Water damage after pool incident", status: "waiting_parts", techNotes: "Corrosion on motherboard. Ordered replacement battery + charging port.", cost: "€85", createdAt: "2024-01-14T14:20:00", priority: "low" },
  { id: "RJ-004", customerName: "Aisha Mensah", phone: "07700 900321", deviceType: "Smartphone", deviceModel: "Samsung Galaxy S23", issue: "Camera not working, blurry photos", status: "ready", techNotes: "Replaced rear camera module. Tested and working perfectly.", cost: "€95", createdAt: "2024-01-13T10:00:00", priority: "normal" },
];

let jobCounter = 5;
function generateId() { return `RJ-${String(jobCounter++).padStart(3, "0")}`; }

function App() {
  const [jobs, setJobs] = useState(() => {
    try { const s = localStorage.getItem("fixlab_jobs"); return s ? JSON.parse(s) : SAMPLE_JOBS; } catch { return SAMPLE_JOBS; }
  });
  const [view, setView] = useState("board");
  const [selectedJob, setSelectedJob] = useState(null);
  const [filterStatus, setFilterStatus] = useState("all");
  const [searchQuery, setSearchQuery] = useState("");
  const [showAddModal, setShowAddModal] = useState(false);
  const [editingNotes, setEditingNotes] = useState(false);
  const [tempNotes, setTempNotes] = useState("");
  const [newJob, setNewJob] = useState({ customerName: "", phone: "", deviceType: "Smartphone", deviceModel: "", issue: "", cost: "TBD", priority: "normal" });

  useEffect(() => {
    try { localStorage.setItem("fixlab_jobs", JSON.stringify(jobs)); } catch {}
  }, [jobs]);

  const filteredJobs = jobs.filter(j => {
    const matchStatus = filterStatus === "all" || j.status === filterStatus;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || j.customerName.toLowerCase().includes(q) || j.deviceModel.toLowerCase().includes(q) || j.id.toLowerCase().includes(q) || j.issue.toLowerCase().includes(q);
    return matchStatus && matchSearch;
  });

  function addJob() {
    if (!newJob.customerName || !newJob.deviceModel || !newJob.issue) return;
    const job = { ...newJob, id: generateId(), status: "intake", techNotes: "", createdAt: new Date().toISOString() };
    setJobs(prev => [job, ...prev]);
    setNewJob({ customerName: "", phone: "", deviceType: "Smartphone", deviceModel: "", issue: "", cost: "TBD", priority: "normal" });
    setShowAddModal(false);
  }

  function updateStatus(id, status) {
    setJobs(prev => prev.map(j => j.id === id ? { ...j, status } : j));
    if (selectedJob?.id === id) setSelectedJob(prev => ({ ...prev, status }));
  }

  function saveNotes(id) {
    setJobs(prev => prev.map(j => j.id === id ? { ...j, techNotes: tempNotes } : j));
    setSelectedJob(prev => ({ ...prev, techNotes: tempNotes }));
    setEditingNotes(false);
  }

  function updateCost(id, cost) {
    setJobs(prev => prev.map(j => j.id === id ? { ...j, cost } : j));
    setSelectedJob(prev => ({ ...prev, cost }));
  }

  function deleteJob(id) {
    if (!window.confirm(`Delete job ${id}?`)) return;
    setJobs(prev => prev.filter(j => j.id !== id));
    setSelectedJob(null);
  }

  const statusCounts = Object.fromEntries(Object.keys(STATUS_CONFIG).map(s => [s, jobs.filter(j => j.status === s).length]));
  const activeJobs = jobs.filter(j => j.status !== "collected").length;

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* Header */}
      <div style={{ borderBottom: "1px solid #222", padding: "0 24px", background: "#0F0F0F", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 1400, margin: "0 auto", display: "flex", alignItems: "center", gap: 24, height: 60, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, background: "#E8C468", borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🔧</div>
            <div>
              <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 16, letterSpacing: "-0.5px", color: "#E8C468" }}>PC SERVICES</div>
              <div style={{ fontSize: 9, color: "#555", letterSpacing: "2px" }}>REPAIR MANAGEMENT</div>
            </div>
          </div>
          <div style={{ flex: 1 }} />
          <div style={{ display: "flex", gap: 16, fontSize: 11, color: "#666" }}>
            <span><span style={{ color: "#E8C468", fontWeight: 500 }}>{activeJobs}</span> active</span>
            <span><span style={{ color: "#10B981", fontWeight: 500 }}>{statusCounts.ready || 0}</span> ready</span>
            <span><span style={{ color: "#EF4444", fontWeight: 500 }}>{statusCounts.in_repair || 0}</span> in repair</span>
          </div>
          <div style={{ position: "relative" }}>
            <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search jobs..."
              style={{ background: "#1A1A1A", border: "1px solid #2A2A2A", borderRadius: 6, padding: "7px 12px 7px 30px", color: "#E8E3DC", fontSize: 12, width: 180, fontFamily: "inherit" }} />
            <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: "#444", fontSize: 12 }}>⌕</span>
          </div>
          <div style={{ display: "flex", background: "#1A1A1A", borderRadius: 6, border: "1px solid #2A2A2A", overflow: "hidden" }}>
            {["board", "list"].map(v => (
              <button key={v} onClick={() => setView(v)} className="btn-hover"
                style={{ padding: "6px 14px", background: view === v ? "#222" : "transparent", border: "none", color: view === v ? "#E8E3DC" : "#555", fontSize: 11, cursor: "pointer", letterSpacing: "0.5px", fontFamily: "inherit" }}>
                {v === "board" ? "⊞ BOARD" : "≡ LIST"}
              </button>
            ))}
          </div>
          <button onClick={() => setShowAddModal(true)} className="btn-hover"
            style={{ background: "#E8C468", color: "#0F0F0F", border: "none", borderRadius: 6, padding: "8px 16px", fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.5px" }}>
            + NEW JOB
          </button>
        </div>
      </div>

      {/* Status filter strip */}
      <div style={{ borderBottom: "1px solid #1A1A1A", padding: "0 24px", background: "#0F0F0F" }}>
        <div style={{ maxWidth: 1400, margin: "0 auto", display: "flex", gap: 4, paddingTop: 8, paddingBottom: 8, overflowX: "auto" }}>
          <button onClick={() => setFilterStatus("all")} className="status-pill"
            style={{ padding: "4px 12px", borderRadius: 20, border: "1px solid", borderColor: filterStatus === "all" ? "#E8C468" : "#2A2A2A", background: filterStatus === "all" ? "#E8C46820" : "transparent", color: filterStatus === "all" ? "#E8C468" : "#555", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "inherit" }}>
            ALL · {jobs.length}
          </button>
          {Object.entries(STATUS_CONFIG).map(([key, cfg]) => (
            <button key={key} onClick={() => setFilterStatus(key)} className="status-pill"
              style={{ padding: "4px 12px", borderRadius: 20, border: "1px solid", borderColor: filterStatus === key ? cfg.dot : "#2A2A2A", background: filterStatus === key ? cfg.bg + "20" : "transparent", color: filterStatus === key ? cfg.dot : "#555", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "inherit" }}>
              {cfg.label} · {statusCounts[key] || 0}
            </button>
          ))}
        </div>
      </div>

      {/* Main */}
      <div style={{ maxWidth: 1400, margin: "0 auto", padding: 24, display: "flex", gap: 20 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          {filteredJobs.length === 0 ? (
            <div style={{ textAlign: "center", padding: "80px 20px", color: "#333" }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>🔍</div>
              <div style={{ fontSize: 14 }}>No jobs found</div>
            </div>
          ) : view === "board" ? (
            <div className="grid-board">
              {filteredJobs.map(job => <JobCard key={job.id} job={job} selected={selectedJob?.id === job.id} onClick={() => { setSelectedJob(job); setEditingNotes(false); }} />)}
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {filteredJobs.map(job => <JobRow key={job.id} job={job} selected={selectedJob?.id === job.id} onClick={() => { setSelectedJob(job); setEditingNotes(false); }} />)}
            </div>
          )}
        </div>

        {selectedJob && (
          <DetailPanel
            job={selectedJob} onClose={() => setSelectedJob(null)}
            onStatusChange={(s) => updateStatus(selectedJob.id, s)}
            onDelete={() => deleteJob(selectedJob.id)}
            editingNotes={editingNotes} tempNotes={tempNotes}
            onEditNotes={() => { setEditingNotes(true); setTempNotes(selectedJob.techNotes); }}
            onSaveNotes={() => saveNotes(selectedJob.id)}
            onCancelNotes={() => setEditingNotes(false)}
            onNotesChange={setTempNotes}
            onCostChange={(c) => updateCost(selectedJob.id, c)}
          />
        )}
      </div>

      {/* Add Modal */}
      {showAddModal && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowAddModal(false)}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }}>
          <div className="modal-box" style={{ background: "#141414", border: "1px solid #2A2A2A", borderRadius: 12, padding: 28, width: "100%", maxWidth: 480 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 18, color: "#E8C468" }}>NEW REPAIR JOB — PC SERVICES</div>
              <button onClick={() => setShowAddModal(false)} style={{ background: "none", border: "none", color: "#555", fontSize: 20, cursor: "pointer" }}>×</button>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <Field label="CUSTOMER NAME *" value={newJob.customerName} onChange={v => setNewJob(p => ({ ...p, customerName: v }))} placeholder="Full name" />
                <Field label="PHONE NUMBER" value={newJob.phone} onChange={v => setNewJob(p => ({ ...p, phone: v }))} placeholder="07xxx xxxxxx" />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <SelectField label="DEVICE TYPE" value={newJob.deviceType} options={DEVICE_TYPES} onChange={v => setNewJob(p => ({ ...p, deviceType: v }))} />
                <Field label="DEVICE MODEL *" value={newJob.deviceModel} onChange={v => setNewJob(p => ({ ...p, deviceModel: v }))} placeholder="e.g. iPhone 15" />
              </div>
              <Field label="ISSUE DESCRIPTION *" value={newJob.issue} onChange={v => setNewJob(p => ({ ...p, issue: v }))} placeholder="Describe the problem..." multiline />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <Field label="ESTIMATED COST" value={newJob.cost} onChange={v => setNewJob(p => ({ ...p, cost: v }))} placeholder="€0.00 or TBD" />
                <SelectField label="PRIORITY" value={newJob.priority} options={["low", "normal", "high"]} onChange={v => setNewJob(p => ({ ...p, priority: v }))} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
              <button onClick={() => setShowAddModal(false)} className="btn-hover"
                style={{ flex: 1, padding: "10px", background: "none", border: "1px solid #2A2A2A", borderRadius: 6, color: "#666", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>CANCEL</button>
              <button onClick={addJob} className="btn-hover"
                style={{ flex: 2, padding: "10px", background: "#E8C468", border: "none", borderRadius: 6, color: "#0F0F0F", fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>CREATE JOB</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function JobCard({ job, selected, onClick }) {
  const cfg = STATUS_CONFIG[job.status];
  const age = Math.floor((Date.now() - new Date(job.createdAt)) / 86400000);
  return (
    <div className="job-card" onClick={onClick} style={{ background: selected ? "#1C1C1C" : "#141414", border: `1px solid ${selected ? "#E8C46840" : "#1E1E1E"}`, borderRadius: 10, padding: 16, cursor: "pointer", boxShadow: selected ? "0 0 0 1px #E8C46830" : "none" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 10, color: "#444", letterSpacing: "1px", marginBottom: 4 }}>{job.id}</div>
          <div style={{ fontSize: 14, fontWeight: 500, color: "#E8E3DC" }}>{job.customerName}</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
          {job.priority === "high" && <span style={{ fontSize: 9, background: "#EF444420", color: "#EF4444", padding: "2px 6px", borderRadius: 3, letterSpacing: "1px" }}>URGENT</span>}
          <span style={{ fontSize: 9, background: cfg.bg + "30", color: cfg.dot, padding: "2px 8px", borderRadius: 3, letterSpacing: "0.5px", border: `1px solid ${cfg.dot}30` }}>{cfg.label}</span>
        </div>
      </div>
      <div style={{ fontSize: 11, color: "#888", marginBottom: 4 }}>{job.deviceType} · {job.deviceModel}</div>
      <div style={{ fontSize: 11, color: "#555", lineHeight: 1.5, marginBottom: 12, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{job.issue}</div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 12, color: "#E8C468", fontWeight: 500 }}>{job.cost}</span>
        <span style={{ fontSize: 10, color: "#333" }}>{age === 0 ? "Today" : age === 1 ? "Yesterday" : `${age}d ago`}</span>
      </div>
    </div>
  );
}

function JobRow({ job, selected, onClick }) {
  const cfg = STATUS_CONFIG[job.status];
  const age = Math.floor((Date.now() - new Date(job.createdAt)) / 86400000);
  return (
    <div onClick={onClick} style={{ background: selected ? "#1C1C1C" : "#141414", border: `1px solid ${selected ? "#E8C46840" : "#1E1E1E"}`, borderRadius: 8, padding: "12px 16px", cursor: "pointer", display: "flex", alignItems: "center", gap: 16, transition: "all 0.15s" }}>
      <div style={{ fontSize: 10, color: "#444", width: 60, flexShrink: 0 }}>{job.id}</div>
      <div style={{ width: 140, flexShrink: 0 }}>
        <div style={{ fontSize: 13, color: "#E8E3DC" }}>{job.customerName}</div>
        <div style={{ fontSize: 10, color: "#555" }}>{job.phone}</div>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 12, color: "#888" }}>{job.deviceType} · {job.deviceModel}</div>
        <div style={{ fontSize: 11, color: "#555", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{job.issue}</div>
      </div>
      <span style={{ fontSize: 10, background: cfg.bg + "30", color: cfg.dot, padding: "3px 10px", borderRadius: 3, letterSpacing: "0.5px", border: `1px solid ${cfg.dot}30`, flexShrink: 0 }}>{cfg.label}</span>
      <div style={{ fontSize: 12, color: "#E8C468", width: 70, textAlign: "right", flexShrink: 0 }}>{job.cost}</div>
      <div style={{ fontSize: 10, color: "#333", width: 60, textAlign: "right", flexShrink: 0 }}>{age === 0 ? "Today" : `${age}d ago`}</div>
    </div>
  );
}

function DetailPanel({ job, onClose, onStatusChange, onDelete, editingNotes, tempNotes, onEditNotes, onSaveNotes, onCancelNotes, onNotesChange, onCostChange }) {
  const cfg = STATUS_CONFIG[job.status];
  const [editCost, setEditCost] = useState(false);
  const [tempCost, setTempCost] = useState(job.cost);
  useEffect(() => { setTempCost(job.cost); }, [job.cost]);
  const statusFlow = Object.keys(STATUS_CONFIG);

  return (
    <div className="detail-panel" style={{ width: 320, flexShrink: 0, background: "#141414", border: "1px solid #1E1E1E", borderRadius: 12, padding: 20, alignSelf: "flex-start", position: "sticky", top: 80, maxHeight: "calc(100vh - 100px)", overflowY: "auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 10, color: "#444", letterSpacing: "1px" }}>{job.id}</div>
          <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 16, color: "#E8E3DC", marginTop: 2 }}>{job.customerName}</div>
        </div>
        <button onClick={onClose} style={{ background: "none", border: "none", color: "#444", fontSize: 18, cursor: "pointer" }}>×</button>
      </div>
      <div style={{ background: cfg.bg + "20", border: `1px solid ${cfg.dot}30`, borderRadius: 6, padding: "8px 12px", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: cfg.dot }} />
        <span style={{ fontSize: 12, color: cfg.dot, fontWeight: 500 }}>{cfg.label}</span>
      </div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 10, color: "#444", letterSpacing: "1px", marginBottom: 8 }}>UPDATE STATUS</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {statusFlow.map(s => {
            const c = STATUS_CONFIG[s];
            const isCurrent = s === job.status;
            return (
              <button key={s} onClick={() => onStatusChange(s)} className="btn-hover"
                style={{ fontSize: 10, padding: "4px 10px", borderRadius: 4, border: `1px solid ${isCurrent ? c.dot : "#2A2A2A"}`, background: isCurrent ? c.bg + "20" : "transparent", color: isCurrent ? c.dot : "#444", cursor: "pointer", fontFamily: "inherit" }}>
                {c.label}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{ borderTop: "1px solid #1E1E1E", margin: "16px 0" }} />
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: "#444", letterSpacing: "1px", marginBottom: 8 }}>DEVICE</div>
        <div style={{ fontSize: 13, color: "#E8E3DC" }}>{job.deviceModel}</div>
        <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>{job.deviceType}</div>
      </div>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: "#444", letterSpacing: "1px", marginBottom: 8 }}>CONTACT</div>
        <div style={{ fontSize: 12, color: "#888" }}>{job.phone || "—"}</div>
      </div>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: "#444", letterSpacing: "1px", marginBottom: 8 }}>REPORTED ISSUE</div>
        <div style={{ fontSize: 12, color: "#888", lineHeight: 1.6 }}>{job.issue}</div>
      </div>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: "#444", letterSpacing: "1px", marginBottom: 8 }}>COST (EX. VAT)</div>
        {editCost ? (
          <div style={{ display: "flex", gap: 6 }}>
            <input value={tempCost} onChange={e => setTempCost(e.target.value)}
              style={{ flex: 1, background: "#1A1A1A", border: "1px solid #E8C468", borderRadius: 4, padding: "5px 8px", color: "#E8E3DC", fontSize: 12, fontFamily: "inherit" }} placeholder="e.g. 100" />
            <button onClick={() => { onCostChange(tempCost); setEditCost(false); }}
              style={{ background: "#E8C468", border: "none", borderRadius: 4, padding: "5px 10px", color: "#0F0F0F", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>✓</button>
          </div>
        ) : (
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 16, color: "#E8C468", fontWeight: 500 }}>{job.cost}</span>
            <button onClick={() => setEditCost(true)} style={{ background: "none", border: "none", color: "#444", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>edit</button>
          </div>
        )}
        {(() => {
          const raw = parseFloat((job.cost || "").toString().replace(/[^0-9.]/g, ""));
          if (isNaN(raw)) return null;
          const vat = raw * 0.23;
          const total = raw + vat;
          return (
            <div style={{ marginTop: 10, background: "#1A1A1A", borderRadius: 6, padding: "10px 12px", display: "flex", flexDirection: "column", gap: 5 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#666" }}>
                <span>Ex. VAT</span><span>€{raw.toFixed(2)}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#666" }}>
                <span>VAT @ 23%</span><span>€{vat.toFixed(2)}</span>
              </div>
              <div style={{ borderTop: "1px solid #2A2A2A", marginTop: 4, paddingTop: 6, display: "flex", justifyContent: "space-between", fontSize: 13, color: "#E8C468", fontWeight: 500 }}>
                <span>TOTAL</span><span>€{total.toFixed(2)}</span>
              </div>
            </div>
          );
        })()}
      </div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ fontSize: 10, color: "#444", letterSpacing: "1px" }}>TECH NOTES</div>
          {!editingNotes && <button onClick={onEditNotes} style={{ background: "none", border: "none", color: "#444", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>edit</button>}
        </div>
        {editingNotes ? (
          <div>
            <textarea value={tempNotes} onChange={e => onNotesChange(e.target.value)} rows={4}
              style={{ width: "100%", background: "#1A1A1A", border: "1px solid #E8C468", borderRadius: 6, padding: "8px 10px", color: "#E8E3DC", fontSize: 12, lineHeight: 1.6, resize: "vertical", fontFamily: "inherit" }} />
            <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
              <button onClick={onCancelNotes} style={{ flex: 1, padding: "6px", background: "none", border: "1px solid #2A2A2A", borderRadius: 4, color: "#666", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
              <button onClick={onSaveNotes} style={{ flex: 1, padding: "6px", background: "#E8C468", border: "none", borderRadius: 4, color: "#0F0F0F", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
            </div>
          </div>
        ) : (
          <div style={{ fontSize: 12, color: job.techNotes ? "#888" : "#333", lineHeight: 1.6, fontStyle: job.techNotes ? "normal" : "italic" }}>
            {job.techNotes || "No notes yet..."}
          </div>
        )}
      </div>
      <div style={{ borderTop: "1px solid #1E1E1E", margin: "16px 0" }} />
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 10, color: "#444", marginBottom: 4 }}>PRIORITY</div>
          <span style={{ fontSize: 11, color: job.priority === "high" ? "#EF4444" : job.priority === "low" ? "#555" : "#888", textTransform: "uppercase", letterSpacing: "0.5px" }}>{job.priority}</span>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 10, color: "#444", marginBottom: 4 }}>LOGGED</div>
          <span style={{ fontSize: 11, color: "#555" }}>{new Date(job.createdAt).toLocaleDateString("en-GB", { day: "numeric", month: "short" })}</span>
        </div>
      </div>
      <button onClick={onDelete} className="btn-hover"
        style={{ width: "100%", padding: "8px", background: "none", border: "1px solid #2A2A2A", borderRadius: 6, color: "#444", fontSize: 11, cursor: "pointer", fontFamily: "inherit", marginTop: 4 }}>
        DELETE JOB
      </button>
    </div>
  );
}

function Field({ label, value, onChange, placeholder, multiline }) {
  const style = { width: "100%", background: "#1A1A1A", border: "1px solid #2A2A2A", borderRadius: 6, padding: "8px 10px", color: "#E8E3DC", fontSize: 12, fontFamily: "'DM Mono', monospace", resize: multiline ? "vertical" : undefined };
  return (
    <div>
      <div style={{ fontSize: 9, color: "#444", letterSpacing: "1.5px", marginBottom: 5 }}>{label}</div>
      {multiline ? <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} style={style} /> : <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={style} />}
    </div>
  );
}

function SelectField({ label, value, options, onChange }) {
  return (
    <div>
      <div style={{ fontSize: 9, color: "#444", letterSpacing: "1.5px", marginBottom: 5 }}>{label}</div>
      <select value={value} onChange={e => onChange(e.target.value)}
        style={{ width: "100%", background: "#1A1A1A", border: "1px solid #2A2A2A", borderRadius: 6, padding: "8px 10px", color: "#E8E3DC", fontSize: 12, fontFamily: "'DM Mono', monospace", cursor: "pointer" }}>
        {options.map(o => <option key={o} value={o}>{o.charAt(0).toUpperCase() + o.slice(1)}</option>)}
      </select>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
